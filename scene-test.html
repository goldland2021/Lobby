<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scene Loading Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 5px 0; border-radius: 3px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
    </style>
</head>
<body>
    <h1>Cocos Scene Loading Test</h1>
    
    <h2>Test Results:</h2>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        async function runTests() {
            addLog('Starting scene loading tests...', 'info');
            
            // Test 1: Check if we can load settings.json
            try {
                const response = await fetch('src/settings.json');
                if (response.ok) {
                    const settings = await response.json();
                    addLog('✅ settings.json loaded successfully', 'success');
                    addLog(`Launch Scene: ${settings.launch?.launchScene || 'Not found'}`, 'info');
                    
                    // Parse the scene path
                    const scenePath = settings.launch?.launchScene;
                    if (scenePath) {
                        // Convert db:// path to actual path
                        // db://assets/scenes/LobbyScene.scene -> assets/scenes/LobbyScene.scene
                        const actualPath = scenePath.replace('db://', '');
                        addLog(`Scene path: ${actualPath}`, 'info');
                        
                        // Try to load the scene file
                        try {
                            const sceneResponse = await fetch(actualPath);
                            if (sceneResponse.ok) {
                                addLog(`✅ Scene file exists: ${actualPath}`, 'success');
                            } else {
                                addLog(`❌ Scene file not found (${sceneResponse.status}): ${actualPath}`, 'error');
                                
                                // Try alternative paths
                                const altPaths = [
                                    'assets/main/' + actualPath.split('/').pop(),
                                    'assets/resources/' + actualPath.split('/').pop(),
                                    actualPath.replace('.scene', '.json'),
                                    actualPath.replace('.scene', '.bin')
                                ];
                                
                                for (const altPath of altPaths) {
                                    try {
                                        const altResponse = await fetch(altPath);
                                        if (altResponse.ok) {
                                            addLog(`✅ Found alternative: ${altPath}`, 'success');
                                            break;
                                        }
                                    } catch (e) {
                                        // Ignore
                                    }
                                }
                            }
                        } catch (e) {
                            addLog(`❌ Error loading scene: ${e.message}`, 'error');
                        }
                    }
                } else {
                    addLog(`❌ Failed to load settings.json: ${response.status}`, 'error');
                }
            } catch (e) {
                addLog(`❌ Error fetching settings.json: ${e.message}`, 'error');
            }
            
            // Test 2: Check main bundle
            try {
                const response = await fetch('assets/main/config.json');
                if (response.ok) {
                    addLog('✅ Main bundle config loaded', 'success');
                } else {
                    addLog(`❌ Main bundle config failed: ${response.status}`, 'error');
                }
            } catch (e) {
                addLog(`❌ Error loading main bundle: ${e.message}`, 'error');
            }
            
            // Test 3: Check if Cocos engine loads
            try {
                const script = document.createElement('script');
                script.src = 'cocos-js/cc.js';
                
                script.onload = () => {
                    addLog('✅ Cocos engine script loaded', 'success');
                    
                    if (typeof cc !== 'undefined') {
                        addLog(`✅ Cocos engine initialized: ${cc.ENGINE_VERSION || 'unknown version'}`, 'success');
                    } else {
                        addLog('❌ Cocos engine not available after loading', 'error');
                    }
                };
                
                script.onerror = () => {
                    addLog('❌ Failed to load Cocos engine script', 'error');
                };
                
                document.head.appendChild(script);
            } catch (e) {
                addLog(`❌ Error testing Cocos engine: ${e.message}`, 'error');
            }
            
            // Test 4: Check WebGL support
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                
                if (gl) {
                    addLog('✅ WebGL is supported', 'success');
                } else {
                    addLog('❌ WebGL is not supported', 'error');
                }
            } catch (e) {
                addLog(`❌ WebGL test error: ${e.message}`, 'error');
            }
            
            addLog('Tests completed. Please share these results.', 'info');
        }
        
        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
