<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cache Bypass Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .loading { background: #fff3cd; border-color: #ffeaa7; }
        img { max-width: 100px; max-height: 100px; margin: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Vercel Cache Bypass Test</h1>
    
    <div class="test" id="test1">
        <h3>Test 1: Direct PNG Access (可能被缓存)</h3>
        <div id="result1">Testing...</div>
        <img id="img1" style="display:none;">
    </div>
    
    <div class="test" id="test2">
        <h3>Test 2: PNG with Version Parameter (绕过缓存)</h3>
        <div id="result2">Testing...</div>
        <img id="img2" style="display:none;">
    </div>
    
    <div class="test" id="test3">
        <h3>Test 3: PNG with Random Query (完全绕过)</h3>
        <div id="result3">Testing...</div>
        <img id="img3" style="display:none;">
    </div>
    
    <div class="test" id="test4">
        <h3>Test 4: Different Path Structure (路径绕过)</h3>
        <div id="result4">Testing...</div>
        <img id="img4" style="display:none;">
    </div>
    
    <script>
        const pngFiles = [
            'assets/main/native/54/544e49d6-3f05-4fa8-9a9e-091f98fc2ce8.png',
            'assets/main/native/20/20835ba4-6145-4fbc-a58a-051ce700aa3e.png',
            'assets/main/native/95/951249e0-9f16-456d-8b85-a6ca954da16b.png'
        ];
        
        const testFile = pngFiles[0]; // 测试第一个文件
        
        async function testDirectAccess() {
            const url = testFile;
            const result = await testImage(url);
            document.getElementById('result1').textContent = result.message;
            document.getElementById('test1').className = `test ${result.status}`;
            
            if (result.success) {
                document.getElementById('img1').src = url;
                document.getElementById('img1').style.display = 'block';
            }
        }
        
        async function testVersionParam() {
            const url = `${testFile}?v=${Date.now()}`;
            const result = await testImage(url);
            document.getElementById('result2').textContent = result.message;
            document.getElementById('test2').className = `test ${result.status}`;
            
            if (result.success) {
                document.getElementById('img2').src = url;
                document.getElementById('img2').style.display = 'block';
            }
        }
        
        async function testRandomQuery() {
            const random = Math.random().toString(36).substring(7);
            const url = `${testFile}?cache=${random}&t=${Date.now()}`;
            const result = await testImage(url);
            document.getElementById('result3').textContent = result.message;
            document.getElementById('test3').className = `test ${result.status}`;
            
            if (result.success) {
                document.getElementById('img3').src = url;
                document.getElementById('img3').style.display = 'block';
            }
        }
        
        async function testDifferentPath() {
            // 尝试不同的路径结构
            const url = `/${testFile}?bypass=true`;
            const result = await testImage(url);
            document.getElementById('result4').textContent = result.message;
            document.getElementById('test4').className = `test ${result.status}`;
            
            if (result.success) {
                document.getElementById('img4').src = url;
                document.getElementById('img4').style.display = 'block';
            }
        }
        
        async function testImage(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                
                if (response.ok) {
                    return {
                        success: true,
                        status: 'success',
                        message: `✅ ${url} - Status: ${response.status}`
                    };
                } else {
                    return {
                        success: false,
                        status: 'error',
                        message: `❌ ${url} - Status: ${response.status}`
                    };
                }
            } catch (error) {
                return {
                    success: false,
                    status: 'error',
                    message: `❌ ${url} - Error: ${error.message}`
                };
            }
        }
        
        // 运行所有测试
        async function runTests() {
            await testDirectAccess();
            await testVersionParam();
            await testRandomQuery();
            await testDifferentPath();
            
            // 总结
            console.log('Cache bypass tests completed. Check which method works.');
        }
        
        // 页面加载后运行测试
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
