<!DOCTYPE html>
<html>
<head>
    <title>WebGL Test for TMA</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        code {
            background: #e9ecef;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>WebGL & Environment Test for Telegram Mini App</h1>
    
    <div id="results">
        <div class="result info" id="loading">Testing environment...</div>
    </div>
    
    <h2>Test Results:</h2>
    <div id="test-results"></div>
    
    <script>
        function addResult(title, message, type = 'info') {
            const container = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${title}:</strong> ${message}`;
            container.appendChild(div);
        }
        
        function testWebGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                
                if (gl && gl instanceof WebGLRenderingContext) {
                    addResult('WebGL Support', '✅ WebGL is supported', 'success');
                    
                    // Test WebGL capabilities
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        addResult('WebGL Vendor', vendor, 'info');
                        addResult('WebGL Renderer', renderer, 'info');
                    }
                    
                    // Check for specific extensions needed by Cocos
                    const extensions = [
                        'OES_texture_float',
                        'OES_texture_float_linear',
                        'OES_texture_half_float',
                        'OES_texture_half_float_linear',
                        'WEBGL_compressed_texture_s3tc',
                        'WEBGL_compressed_texture_pvrtc',
                        'WEBGL_compressed_texture_etc1'
                    ];
                    
                    extensions.forEach(ext => {
                        const supported = gl.getExtension(ext);
                        addResult(`Extension ${ext}`, supported ? '✅ Supported' : '❌ Not supported', 
                                 supported ? 'success' : 'warning');
                    });
                    
                } else {
                    addResult('WebGL Support', '❌ WebGL is NOT supported', 'error');
                }
            } catch (e) {
                addResult('WebGL Test Error', `❌ ${e.message}`, 'error');
            }
        }
        
        function testEnvironment() {
            // User Agent
            addResult('User Agent', navigator.userAgent, 'info');
            
            // Platform
            addResult('Platform', navigator.platform, 'info');
            
            // Language
            addResult('Language', navigator.language, 'info');
            
            // Screen info
            addResult('Screen Size', `${window.screen.width} × ${window.screen.height}`, 'info');
            addResult('Device Pixel Ratio', window.devicePixelRatio, 'info');
            
            // Check for TMA specific features
            if (window.Telegram && window.Telegram.WebApp) {
                addResult('Telegram WebApp', '✅ Detected', 'success');
                
                const webApp = window.Telegram.WebApp;
                addResult('TMA Platform', webApp.platform, 'info');
                addResult('TMA Version', webApp.version, 'info');
                addResult('TMA Viewport Height', webApp.viewportHeight, 'info');
                addResult('TMA Viewport Stable Height', webApp.viewportStableHeight, 'info');
            } else {
                addResult('Telegram WebApp', '❌ Not detected (not in TMA)', 'warning');
            }
            
            // Check for common APIs
            const apis = ['localStorage', 'sessionStorage', 'indexedDB', 'WebSocket'];
            apis.forEach(api => {
                const supported = api in window;
                addResult(`${api} Support`, supported ? '✅ Available' : '❌ Not available',
                         supported ? 'success' : 'warning');
            });
        }
        
        function testResourceLoading() {
            // Test loading a small image
            const img = new Image();
            img.onload = () => addResult('Image Loading', '✅ Images load correctly', 'success');
            img.onerror = () => addResult('Image Loading', '❌ Failed to load image', 'error');
            img.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==';
            
            // Test fetch API
            fetch('.').then(() => {
                addResult('Fetch API', '✅ Fetch works', 'success');
            }).catch(() => {
                addResult('Fetch API', '❌ Fetch failed', 'error');
            });
        }
        
        function runTests() {
            document.getElementById('loading').style.display = 'none';
            
            addResult('Test Started', new Date().toLocaleString(), 'info');
            
            testEnvironment();
            testWebGL();
            testResourceLoading();
            
            addResult('Tests Complete', 'All tests finished', 'success');
        }
        
        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
