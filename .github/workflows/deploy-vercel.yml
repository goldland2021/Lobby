name: Deploy Prebuilt Web Mobile To Vercel

on:
  push:
    branches:
      - master
    paths:
      - "build/web-mobile/**"
      - "api/**"
      - "vercel.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build output
        run: |
          if [ ! -d "build/web-mobile" ]; then
            echo "build/web-mobile not found"
            exit 1
          fi
          if [ ! -f "build/web-mobile/index.html" ]; then
            echo "build/web-mobile/index.html not found"
            exit 1
          fi
          echo "Prebuilt output verified."

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Deploying from repo root (includes /api + prebuilt output)..."
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          echo "Deployment completed"
