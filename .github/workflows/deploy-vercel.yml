name: Deploy Prebuilt Web Mobile To Vercel

on:
  push:
    branches:
      - master
    paths:
      - "build/web-mobile/**"
      - "vercel.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build output
        run: |
          if [ ! -d "build/web-mobile" ]; then
            echo "build/web-mobile not found"
            exit 1
          fi
          if [ ! -f "build/web-mobile/index.html" ]; then
            echo "build/web-mobile/index.html not found"
            exit 1
          fi
          echo "Prebuilt output verified."

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
