name: Build Cocos And Deploy Vercel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, cocos]
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Mobile
        env:
          COCOS_CREATOR_EXE: ${{ secrets.COCOS_CREATOR_EXE }}
        run: powershell -ExecutionPolicy Bypass -File scripts/build-web-mobile.ps1

      - name: Dump Cocos Logs On Failure
        if: failure()
        shell: powershell
        run: |
          $paths = @(
            "$env:GITHUB_WORKSPACE\.ci-cocos-home\.CocosCreator\logs",
            "$env:USERPROFILE\.CocosCreator\logs",
            "C:\Windows\ServiceProfiles\NetworkService\.CocosCreator\logs"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "=== Logs under $p ==="
              Get-ChildItem $p -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 5 | ForEach-Object {
                Write-Host "---- $($_.FullName)"
                Get-Content $_.FullName -Tail 120 -ErrorAction SilentlyContinue
              }
            }
          }

      - name: Verify Build Output
        run: if not exist build\web-mobile\index.html exit /b 1

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy To Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token "%VERCEL_TOKEN%"
          vercel deploy build/web-mobile --prod --token "%VERCEL_TOKEN%"
