name: Build Cocos And Deploy Vercel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, cocos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Mobile
        shell: powershell
        env:
          COCOS_CREATOR_EXE: ${{ secrets.COCOS_CREATOR_EXE }}
        run: npm run build:web-mobile

      - name: Verify Build Output
        shell: powershell
        run: |
          if (-not (Test-Path "build/web-mobile/index.html")) {
            throw "build/web-mobile/index.html not found"
          }

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy To Vercel
        shell: powershell
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token "$env:VERCEL_TOKEN"
          vercel deploy build/web-mobile --prod --token "$env:VERCEL_TOKEN"
