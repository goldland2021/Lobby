name: Build Cocos And Deploy Vercel (Fixed)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, windows, cocos]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Cocos Creator
        shell: powershell
        env:
          COCOS_CREATOR_EXE: ${{ secrets.COCOS_CREATOR_EXE }}
        run: |
          Write-Host "验证Cocos Creator..."
          if (Test-Path $env:COCOS_CREATOR_EXE) {
            Write-Host "✅ Cocos Creator存在: $env:COCOS_CREATOR_EXE"
            # 测试是否能运行
            $version = & "$env:COCOS_CREATOR_EXE" --version 2>&1
            Write-Host "Cocos Creator版本: $version"
          } else {
            Write-Host "❌ Cocos Creator不存在: $env:COCOS_CREATOR_EXE"
            Write-Host "请检查COCOS_CREATOR_EXE secret"
            exit 1
          }

      - name: Build Cocos Project (Simple)
        shell: powershell
        env:
          COCOS_CREATOR_EXE: ${{ secrets.COCOS_CREATOR_EXE }}
        run: |
          Write-Host "开始构建Cocos项目..."
          
          # 方法1: 直接调用Cocos Creator
          $buildArgs = "platform=web-mobile;debug=false;md5Cache=true"
          $projectPath = Get-Location
          
          Write-Host "构建参数: $buildArgs"
          Write-Host "项目路径: $projectPath"
          
          # 设置超时和重试
          $maxRetries = 2
          $timeoutMinutes = 15
          
          for ($retry = 1; $retry -le $maxRetries; $retry++) {
            Write-Host "尝试 $retry/$maxRetries..."
            
            # 启动构建进程
            $process = Start-Process -FilePath $env:COCOS_CREATOR_EXE `
                                     -ArgumentList "--project `"$projectPath`" --build `"$buildArgs`" --disable-gpu" `
                                     -NoNewWindow `
                                     -PassThru `
                                     -RedirectStandardOutput "cocos-build-$retry-stdout.log" `
                                     -RedirectStandardError "cocos-build-$retry-stderr.log"
            
            # 等待完成（带超时）
            $completed = $process.WaitForExit($timeoutMinutes * 60 * 1000)
            
            if (-not $completed) {
              Write-Host "构建超时，终止进程..."
              $process.Kill()
              Start-Sleep -Seconds 2
              continue
            }
            
            # 检查退出代码
            if ($process.ExitCode -eq 0) {
              Write-Host "✅ 构建成功!"
              
              # 显示最后几行日志
              Write-Host "=== 构建日志最后20行 ==="
              Get-Content "cocos-build-$retry-stdout.log" -Tail 20 -ErrorAction SilentlyContinue
              
              break
            } else {
              Write-Host "❌ 构建失败，退出代码: $($process.ExitCode)"
              
              # 显示错误日志
              Write-Host "=== 错误日志 ==="
              Get-Content "cocos-build-$retry-stderr.log" -Tail 50 -ErrorAction SilentlyContinue
              
              if ($retry -eq $maxRetries) {
                Write-Host "所有重试都失败了"
                exit 1
              }
              
              Write-Host "等待5秒后重试..."
              Start-Sleep -Seconds 5
            }
          }

      - name: Verify Build Output
        shell: powershell
        run: |
          Write-Host "验证构建输出..."
          
          $buildDir = "build/web-mobile"
          if (Test-Path $buildDir) {
            Write-Host "✅ 构建目录存在: $buildDir"
            
            # 检查关键文件
            $requiredFiles = @("index.html", "main.js", "style.css")
            $allExist = $true
            
            foreach ($file in $requiredFiles) {
              $path = Join-Path $buildDir $file
              if (Test-Path $path) {
                Write-Host "✅ 文件存在: $file"
              } else {
                Write-Host "❌ 文件缺失: $file"
                $allExist = $false
              }
            }
            
            if (-not $allExist) {
              Write-Host "⚠️ 部分关键文件缺失"
              Write-Host "目录内容:"
              Get-ChildItem $buildDir -Recurse | Select-Object -First 20 Name, Length
            }
          } else {
            Write-Host "❌ 构建目录不存在: $buildDir"
            Write-Host "当前目录内容:"
            Get-ChildItem
            exit 1
          }

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy To Vercel
        shell: powershell
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          Write-Host "部署到Vercel..."
          
          # 验证Vercel环境变量
          if (-not $env:VERCEL_TOKEN) {
            Write-Host "❌ VERCEL_TOKEN未设置"
            exit 1
          }
          
          # 拉取项目配置
          vercel pull --yes --environment=production --token "$env:VERCEL_TOKEN"
          
          # 部署构建目录
          vercel deploy build/web-mobile --prod --token "$env:VERCEL_TOKEN"
          
          Write-Host "✅ 部署完成!"

      - name: Diagnostic Info
        if: always()
        shell: powershell
        run: |
          Write-Host "=== 诊断信息 ==="
          Write-Host "系统信息:"
          systeminfo | Select-String "OS Name", "OS Version", "System Type"
          
          Write-Host "Cocos Creator信息:"
          if (Test-Path $env:COCOS_CREATOR_EXE) {
            $fileInfo = Get-Item $env:COCOS_CREATOR_EXE
            Write-Host "路径: $($fileInfo.FullName)"
            Write-Host "大小: $($fileInfo.Length) bytes"
            Write-Host "修改时间: $($fileInfo.LastWriteTime)"
          }
          
          Write-Host "构建目录状态:"
          if (Test-Path "build/web-mobile") {
            $files = Get-ChildItem "build/web-mobile" -Recurse | Measure-Object
            Write-Host "文件数: $($files.Count)"
            Write-Host "总大小: $(($files | ForEach-Object { $_.Length } | Measure-Object -Sum).Sum) bytes"
          }