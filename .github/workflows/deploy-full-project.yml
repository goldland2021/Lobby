name: Deploy Full Project To Vercel

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - "vercel.json"
      - "package.json"
      - ".github/workflows/deploy-full-project.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Verifying project structure..."
          if [ ! -d "api" ]; then
            echo "❌ api directory not found"
            exit 1
          fi
          if [ ! -f "api/auth.js" ]; then
            echo "❌ api/auth.js not found"
            exit 1
          fi
          if [ ! -f "vercel.json" ]; then
            echo "❌ vercel.json not found"
            exit 1
          fi
          echo "✅ Project structure verified"
          
          echo "API files:"
          ls -la api/
          echo "Config files:"
          ls -la vercel.json package.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy full project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Deploying full project to Vercel..."
          echo "Using token: ${VERCEL_TOKEN:0:10}..."
          
          # 部署整个项目（包括api目录）
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          
          echo "✅ Full project deployment completed"

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          sleep 10  # 等待部署完成
          
          # 测试API端点
          echo "Testing API endpoints..."
          curl -s -o /dev/null -w "Frontend: %{http_code}\n" https://lobby-eosin.vercel.app
          curl -s -o /dev/null -w "API Auth OPTIONS: %{http_code}\n" -X OPTIONS https://lobby-eosin.vercel.app/api/auth
          curl -s -o /dev/null -w "API Play OPTIONS: %{http_code}\n" -X OPTIONS https://lobby-eosin.vercel.app/api/play
          
          echo "✅ Deployment verification complete"